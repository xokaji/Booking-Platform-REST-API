services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:225225@localhost:5432/booking_platform?schema=public
      JWT_ACCESS_SECRET: IOfIVxbnxcnQ4lYRbcm21VU5XP9YUhMiy67WpM1Vi8v
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: 9pk7V8bt5dmacIshgnlXY7TROw0ZioEM8S1O2GEzUag
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main"

volumes:
  postgres_data:
